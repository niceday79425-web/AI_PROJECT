    <script>
        async function loadBlog() {
            const grid = document.getElementById('blogGrid');
            const countEl = document.getElementById('postCount');
            try {
                const response = await fetch('posts.json');
                const posts = await response.json();

                const now = new Date();
                const cutoff = new Date(now);
                cutoff.setDate(cutoff.getDate() - 30);

                const recent = posts.filter(post => {
                    if (!post.date) return false;
                    return new Date(post.date) >= cutoff;
                });

                if (countEl) countEl.textContent = `${recent.length} artigos (últimos 30 dias)`;
                grid.innerHTML = '';

                if (recent.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column:1/-1; padding:3rem; text-align:center; color:var(--text-secondary);">
                            <p style="font-size:1.1rem; margin-bottom:0.5rem;">Nenhum post nos últimos 30 dias.</p>
                            <p style="font-size:0.9rem;">Novos insights de mercado são publicados diariamente.</p>
                        </div>`;
                    return;
                }

                recent.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'blog-card';
                    card.style.cursor = 'pointer';
                    card.onclick = () => window.location.href = post.link;

                    let dateStr = post.date || '';
                    try {
                        const d = new Date(post.date);
                        const diff = Math.floor((now - d) / 86400000);
                        const badge = diff === 0 ? 'Hoje' : diff === 1 ? 'há 1 dia' : `há ${diff} dias`;
                        dateStr = `${post.date} <span style="font-size:0.75rem; color:#10b981; margin-left:6px;">${badge}</span>`;
                    } catch (e) { }

                    card.innerHTML = `
                        <span class="blog-date">${dateStr}</span>
                        <h3>${post.title}</h3>
                        <p>${post.summary || ''}</p>
                    `;
                    grid.appendChild(card);
                });

            } catch (e) {
                console.error('Falha ao carregar posts:', e);
                grid.innerHTML = `<div style="grid-column:1/-1; padding:2rem; text-align:center; color:#ef4444;">Falha ao carregar os dados. Tente novamente mais tarde.</div>`;
            }
        }
        loadBlog();
    </script>
